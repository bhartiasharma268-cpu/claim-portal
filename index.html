<!DOCTYPE html>
<html>

<head>
<title>Samsung vs Vivo Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>Samsung vs Vivo Sales Dashboard</h1>

<div class="dashboard">

<div class="card">
<h3>Units Sold by Purchase Reason</h3>
<canvas id="reasonChart"></canvas>
</div>

<div class="card">
<h3>Profit by Company</h3>
<canvas id="profitChart"></canvas>
</div>

<div class="card">
<h3>Customer Rating by Product</h3>
<canvas id="ratingChart"></canvas>
</div>

<div class="card">
<h3>Revenue by Company</h3>
<canvas id="revenueChart"></canvas>
</div>

<div class="card full">
<h3>Units Sold by Product</h3>
<canvas id="productChart"></canvas>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
