<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="sidebar">

<h2>Portal</h2>

<ul>
<li>Dashboard</li>
<li>Journal</li>
<li>Backtest</li>
<li>Copier</li>
<li>Learn</li>
<li>Community</li>
</ul>

</div>

<div class="main">

<h1>Dashboard</h1>

<div class="cards">

<div class="card">
<h3>Net P&L</h3>
<p id="pnl">$0</p>
</div>

<div class="card">
<h3>Win Rate</h3>
<p id="winrate">0%</p>
</div>

<div class="card">
<h3>Profit Factor</h3>
<p id="profitfactor">0</p>
</div>

<div class="card">
<h3>Average R:R</h3>
<p id="rr">0</p>
</div>

</div>

<h2>Weekly Trade Distribution</h2>

<canvas id="tradeChart"></canvas>

</div>

<script src="script.js"></script>

</body>
</html>
