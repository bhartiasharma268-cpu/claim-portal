<!DOCTYPE html>
<html>

<head>

<title>Claim Portal</title>
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="navbar">

</ul>

</div>


<div id="about" class="page" style="display:none;">

<h2>About</h2>

</div>

</html>
