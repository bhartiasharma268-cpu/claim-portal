<!DOCTYPE html>
<html>

<head>

<title>Claim Portal</title>
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="navbar">

<h2>Claim Portal</h2>

<ul>

<li onclick="showPage('home')">Home</li>
<li onclick="showPage('claims')">Claims</li>
<li onclick="showPage('about')">About</li>

</ul>

</div>


<div id="home" class="page">

<h1>Welcome Bharti</h1>

<div class="cards">

<div class="card">
<h3>Total Claims</h3>
<p id="total">0</p>
</div>

<div class="card">
<h3>Approved</h3>
<p>0</p>
</div>

<div class="card">
<h3>Pending</h3>
<p>0</p>
</div>

</div>

</div>


<div id="claims" class="page" style="display:none;">

<h2>Add New Claim</h2>

<input type="text" id="claim" placeholder="Enter claim name">

<button onclick="addClaim()">Submit</button>

<ul id="claimList"></ul>

</div>


<div id="about" class="page" style="display:none;">

<h2>About</h2>

<p>This portal is built using HTML, CSS and JavaScript.</p>

</div>


<script src="script.js"></script>

<input type="text" id="claim" placeholder="Enter claim name">

<button onclick="addClaim()">Submit</button>

<ul id="claimList"></ul>

</body>
  
</html>
